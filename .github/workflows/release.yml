name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            backend_ext: ''
          - os: windows-latest
            platform: win
            backend_ext: '.exe'

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Node dependencies
        shell: bash
        run: npm ci --no-audit --no-fund

      - name: Install Python dependencies
        shell: bash
        run: cd backend && uv sync --extra pack

      - name: Build backend (PyInstaller)
        shell: bash
        run: cd backend && uv run pyinstaller gas_backend.spec --distpath ../backend-dist --workpath ../build/pyinstaller --noconfirm

      - name: Verify backend binary
        shell: bash
        run: ls -la backend-dist/gas_backend/gas_backend${{ matrix.backend_ext }}

      - name: Build frontend (Vite)
        shell: bash
        run: npx vite build

      - name: Build Electron installer
        shell: bash
        run: npx electron-builder --${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.blockmap
          if-no-files-found: warn

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
